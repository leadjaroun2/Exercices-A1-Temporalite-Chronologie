<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Chronologie A1 - Français</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057;
            --accent: #00A9CE;
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 20px 0;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 10px;
        }

        .translation-link {
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            font-style: italic;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover { background: #002340; }

        #result-screen { text-align: center; display: none; }
        .score-big { font-size: 64px; color: var(--primary); font-weight: 800; margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Chronologie &amp; Récit (A1)</h1>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-link" id="t-link" onclick="toggleTranslation()">👁️ Traduire en anglais / Translate to English</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>

<script>
    const questions = [
        { q: "________, je prépare mes affaires pour l'école. (Action 1)", t: "First, I prepare my things for school.", o: ["Enfin", "D'abord", "Ensuite", "Après"], a: 1 },
        { q: "Au ________, l'histoire est très intéressante.", t: "At the beginning, the story is very interesting.", o: ["fin", "ensuite", "début", "puis"], a: 2 },
        { q: "J'écoute le professeur, ________ je fais les exercices.", t: "I listen to the teacher, then I do the exercises.", o: ["d'abord", "au début", "puis", "finalement"], a: 2 },
        { q: "Nous mangeons à la cantine. ________, nous allons au laboratoire.", t: "We eat at the cafeteria. Next, we go to the lab.", o: ["D'abord", "Ensuite", "Finalement", "Au début"], a: 1 },
        { q: "Je finis mes devoirs. ________, je regarde un dessin animé.", t: "I finish my homework. After, I watch a cartoon.", o: ["Après", "D'abord", "Au début", "Enfin"], a: 0 },
        { q: "________, je ferme mon livre et je dors. (Dernière action)", t: "Finally, I close my book and I sleep.", o: ["D'abord", "Ensuite", "Enfin", "Puis"], a: 2 },
        { q: "________ de la journée, je parle avec mes parents.", t: "At the end of the day, I talk with my parents.", o: ["Au début", "À la fin", "Ensuite", "Puis"], a: 1 },
        { q: "Je cherche mes clés, je trouve mes clés et, ________, je ouvre la porte.", t: "I look for my keys, I find my keys and, finally, I open the door.", o: ["d'abord", "ensuite", "finalement", "au début"], a: 2 },
        { q: "________, j'achète un billet de train. (Étape 1)", t: "First, I buy a train ticket.", o: ["Enfin", "Après", "D'abord", "Ensuite"], a: 2 },
        { q: "Le train part. ________, je regarde le paysage.", t: "The train leaves. Then, I look at the landscape.", o: ["Au début", "Puis", "D'abord", "Enfin"], a: 1 },
        { q: "Le voyage est long mais, ________, j'arrive à Paris !", t: "The trip is long but, finally, I arrive in Paris!", o: ["d'abord", "au début", "ensuite", "finalement"], a: 3 },
        { q: "________, je prépare le pain et le beurre.", t: "First, I prepare the bread and the butter.", o: ["D'abord", "Après", "Enfin", "Ensuite"], a: 2 },
        { q: "Je coupe le pain, ________ je mets le beurre.", t: "I cut the bread, next I put the butter.", o: ["au début", "d'abord", "ensuite", "finalement"], a: 2 },
        { q: "________ de la recette, le gâteau est délicieux.", t: "At the end of the recipe, the cake is delicious.", o: ["À la fin", "Au début", "Puis", "Après"], a: 0 },
        { q: "________, je fais du jogging dans le parc. (Action initiale)", t: "First, I go jogging in the park.", o: ["Après", "D'abord", "Puis", "Enfin"], a: 1 },
        { q: "Je cours un kilomètre, ________ je bois de l'eau.", t: "I run a kilometer, then I drink water.", o: ["d'abord", "au début", "puis", "finalement"], a: 2 },
        { q: "Je marche un peu et, ________, je rentre chez moi.", t: "I walk a bit and, finally, I go home.", o: ["d'abord", "ensuite", "enfin", "au début"], a: 2 },
        { q: "________ du film, l'acteur principal voyage en Afrique.", t: "At the beginning of the movie, the main actor travels to Africa.", o: ["Au début", "À la fin", "Ensuite", "Enfin"], a: 0 },
        { q: "Choisissez le synonyme de 'Puis' :", t: "Choose the synonym of 'Puis':", o: ["D'abord", "Au début", "Ensuite", "Enfin"], a: 2 },
        { q: "Choisissez le synonyme de 'Enfin' :", t: "Choose the synonym of 'Enfin':", o: ["D'abord", "Finalement", "Ensuite", "Puis"], a: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let isTrans = false;

    function loadQ() {
        isTrans = false;
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('t-link').innerText = "👁️ Traduire en anglais / Translate to English";
        document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/20`;
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / 20 * 100) + "%";
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => check(i, btn);
            optCont.appendChild(btn);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function toggleTranslation() {
        isTrans = !isTrans;
        document.getElementById('t-link').innerText = isTrans ? questions[currentIdx].t : "👁️ Traduire en anglais / Translate to English";
    }

    function check(i, btn) {
        const correct = questions[currentIdx].a;
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        const f = document.getElementById('feedback');
        f.style.display = 'block';

        if(i === correct) {
            btn.classList.add('correct');
            f.innerText = "Excellent ! Correct. ✅";
            f.style.color = "var(--success)";
            score++;
            document.getElementById('score-count').innerText = "Score: " + score;
        } else {
            btn.classList.add('incorrect');
            all[correct].classList.add('correct');
            f.innerText = "Dommage ! La réponse était : " + questions[currentIdx].o[correct] + " ❌";
            f.style.color = "var(--error)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 20) loadQ();
        else showRes();
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score + " / 20";
        const comm = document.getElementById('res-comment');
        if(score === 20) comm.innerHTML = "Parfait ! Vous êtes un expert de la chronologie.<br><i>Perfect! You are a chronology expert.</i>";
        else if(score >= 14) comm.innerHTML = "Très bien ! Vous comprenez bien la suite des événements.<br><i>Great! You understand the sequence of events well.</i>";
        else comm.innerHTML = "Continuez d'apprendre les connecteurs logiques !<br><i>Keep learning logical connectors!</i>";
    }

    loadQ();
</script>

</body>
</html>
